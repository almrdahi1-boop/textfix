<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextFix - تدقيق إملائي ونحوي مجاني</title>
  <meta name="description" content="أداة مجانية للتدقيق الإملائي والنحوي. صحح نصوصك العربية والإنجليزية بسرعة.">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--error-text:#dc2626;--success:#16a34a;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
    body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
    header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
    .logo{font-size:24px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px}
    .logo span{font-size:14px;font-weight:400;color:var(--text-muted)}
    .toolbar{display:flex;gap:6px;background:var(--bg);border-radius:8px;padding:3px}
    .tool-btn{border:none;background:transparent;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-muted);transition:all .15s}
    .tool-btn.active,.tool-btn:hover{background:var(--primary);color:#fff}
    main{max-width:900px;margin:0 auto;padding:32px 20px;flex:1;width:100%}
    .hero{text-align:center;margin-bottom:24px}
    .hero h1{font-size:28px;margin-bottom:8px}
    .hero p{color:var(--text-muted)}
    .stats{display:flex;gap:24px;justify-content:center;margin-bottom:20px;font-size:14px;color:var(--text-muted);flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .actions{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap}
    .btn{border:1px solid var(--border);background:var(--card);padding:8px 18px;border-radius:6px;cursor:pointer;font-size:14px;color:var(--text);transition:all .15s}
    .btn:hover,.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .btn.primary:hover{background:var(--primary-dark)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    textarea{width:100%;min-height:280px;padding:20px;border:none;font-size:16px;line-height:1.8;resize:vertical;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--text);background:transparent}
    textarea:focus{outline:none}
    textarea::placeholder{color:#94a3b8}
    .loading{display:none;height:3px;background:linear-gradient(90deg,var(--primary),#818cf8);animation:load 1s infinite}
    @keyframes load{0%{width:0}50%{width:50%}100%{width:100%}}
    .loading.show{display:block}
    .panel{display:none;margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
    .panel.show{display:block}
    .panel h3{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .panel h3 span:last-child{font-size:14px;color:var(--text-muted);font-weight:400}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:8px;background:var(--bg);border-right:3px solid var(--error-text)}
    .item .msg{flex:1;font-size:14px}
    .item .msg b{display:block;margin-bottom:2px}
    .old{color:var(--error-text);text-decoration:line-through}
    .new{color:var(--success);font-weight:600}
    .ctx{font-size:12px;color:var(--text-muted);margin-top:4px;opacity:.7}
    .ctx em{background:#fef3c7;padding:0 2px;font-style:normal}
    footer{text-align:center;padding:24px;color:var(--text-muted);font-size:13px;border-top:1px solid var(--border);margin-top:40px}
    .hint{text-align:center;padding:8px;font-size:12px;color:var(--text-muted)}
    body.dark{--primary:#60a5fa;--primary-dark:#3b82f6;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--text-muted:#94a3b8;--border:#334155}
    body.dark .item{background:#1e293b}
    body.dark .ctx em{background:#3b2200}
  </style>
</head>
<body>
<header>
  <div class="logo">✏️ TextFix <span>تدقيق مجاني</span></div>
  <div class="toolbar">
    <button class="tool-btn active" data-lang="auto">🌐 تلقائي</button>
    <button class="tool-btn" id="themeBtn">🌙</button>
    <button class="tool-btn" data-lang="ar">🇸🇦 العربية</button>
    <button class="tool-btn" data-lang="en">🇬🇧 English</button>
  </div>
</header>
<main>
  <section class="hero">
    <h1>📝 صحّح نصوصك في ثوانٍ</h1>
    <p>تدقيق إملائي ونحوي مجاني — عربي وإنجليزي</p>
  </section>
  <div class="stats"><span>📝 <strong id="wds">0</strong> كلمة</span><span>🔤 <strong id="chs">0</strong> حرف</span><span id="errStat" style="display:none">⚠️ <strong id="errs">0</strong> خطأ</span></div>
  <div class="card">
    <div class="actions">
      <button class="btn primary" id="goBtn">🔍 تدقيق</button>
      <button class="btn" id="clrBtn">🗑️ مسح</button>
      <button class="btn" id="pstBtn">📋 لصق</button>
    </div>
    <textarea id="txt" dir="auto" placeholder="اكتب أو الصق نصك هنا..." spellcheck="false"></textarea>
    <div class="loading" id="loadBar"></div>
  </div>
  <div class="hint">💡 Ctrl+Enter للتدقيق السريع</div>
  <div class="panel" id="panel">
    <h3><span id="pTitle">نتائج التدقيق</span><span id="pCount"></span></h3>
    <div class="list" id="pList"></div>
  </div>
</main>
<footer>TextFix &copy; 2026 — <a href="#">سياسة الخصوصية</a> | <a href="#">تواصل معنا</a></footer>
<script>
(function(){
  const txt=document.getElementById('txt'),go=document.getElementById('goBtn');
  const clr=document.getElementById('clrBtn'),pst=document.getElementById('pstBtn');
  const pan=document.getElementById('panel'),pL=document.getElementById('pList');
  const pC=document.getElementById('pCount'),pT=document.getElementById('pTitle');
  const wds=document.getElementById('wds'),chs=document.getElementById('chs');
  const ers=document.getElementById('errs'),eS=document.getElementById('errStat');
  const lb=document.getElementById('loadBar'),tb=document.getElementById('themeBtn');
  let lang='auto';

  // Lang toggles
  document.querySelectorAll('.tool-btn[data-lang]').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.tool-btn[data-lang]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');lang=b.dataset.lang;
      // Visual feedback: update subtitle
      const labels={'auto':'🌐 تلقائي','ar':'🇸🇦 العربية','en':'🇬🇧 English'};
      document.querySelector('.tool-btn[data-lang="'+lang+'"]').textContent=labels[lang];
    }
  });

  function stats(t,n){
    const v=t||txt.value;
    wds.textContent=v.trim()?v.trim().split(/\s+/).length:0;
    chs.textContent=v.length;
    if(n!==undefined){ers.textContent=n;eS.style.display=n>0?'inline':'none'}
    else eS.style.display='none';
  }

  function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

  async function check(){
    const text=txt.value.trim();
    if(!text){pan.classList.remove('show');return}
    go.disabled=true;go.textContent='⏳...';lb.classList.add('show');pan.classList.remove('show');
    try{
      const l=lang==='auto'?(/[؀-ۿ]/.test(text)?'ar':'en-US'):lang;
      const params=new URLSearchParams({text,language:l,enabledOnly:'false'});
      const r=await fetch('https://api.languagetool.org/v2/check',{
        method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params.toString()
      });
      const d=await r.json(),m=d.matches||[];
      pan.classList.add('show');stats(text,m.length);
      if(!m.length){pT.textContent='✅ ✅ ✅';pC.textContent='لا توجد أخطاء';pL.innerHTML='<div style="padding:20px;text-align:center;color:var(--success);font-size:18px;font-weight:600;">🎉 نص سليم تمامًا!</div>';return}
      pT.textContent='✏️ نتائج التدقيق';pC.textContent=m.length+' خطأ';
      let html='';
      m.sort((a,b)=>(a.context?.offset||0)-(b.context?.offset||0));
      for(const x of m){
        const ctx=x.context||{},t=ctx.text||'',o=ctx.offset||0,len=ctx.length||0;
        const msg=x.message||'خطأ إملائي',repl=(x.replacements||[]).slice(0,3),old=t.slice(o,o+len);
        const b4=esc(t.slice(Math.max(0,o-30),o)),hl=`<em>${esc(old)}</em>`,af=esc(t.slice(o+len,Math.min(t.length,o+len+30)));
        const rpl=repl.length?` <span class="new">← ${repl.map(r=>esc(r.value)).join(' | ')}</span>`:'';
        html+=`<div class="item"><span>✏️</span><div class="msg"><b>${esc(msg)}</b><span class="old">${esc(old)}</span>${rpl}<div class="ctx">${b4}${hl}${af}</div></div></div>`;
      }
      pL.innerHTML=html;
    }catch(e){pan.classList.add('show');pT.textContent='⚠️ خطأ';pC.textContent='';pL.innerHTML='<div style="padding:20px;text-align:center;color:var(--error-text);">فشل الاتصال. تحقق من اتصالك بالإنترنت.</div>'}
    finally{go.disabled=false;go.textContent='🔍 تدقيق';lb.classList.remove('show')}
  }

  go.onclick=check;
  clr.onclick=()=>{txt.value='';pan.classList.remove('show');stats('',0);txt.focus()};
  pst.onclick=async()=>{try{const t=await navigator.clipboard.readText();txt.value=t;pan.classList.remove('show');stats(t,0)}catch{alert('استخدم Ctrl+V / ⌘V.')}};
  txt.oninput=()=>{stats(txt.value,0);pan.classList.remove('show')};
  txt.onkeydown=e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();check()}};

  // Dark mode
  function setDark(d){document.body.classList.toggle('dark',d);tb.textContent=d?'☀️':'🌙';localStorage.setItem('tf-d',d?'1':'0')}
  const sv=localStorage.getItem('tf-d');sv?setDark(sv==='1'):setDark(window.matchMedia('(prefers-color-scheme:dark)').matches);
  tb.onclick=()=>setDark(!document.body.classList.contains('dark'));
  stats('',0);
})();
</script>
</body>
</html>
